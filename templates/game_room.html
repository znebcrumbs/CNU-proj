<!DOCTYPE html>
<html>
<head>
    <title>HAWAK-KARD Room {{ room_code }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(145deg, #2d3561 0%, #1e2547 100%);
            border: 4px solid #4a5568;
            padding: 25px;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.4);
            border-radius: 8px;
            position: relative;
            z-index: 10;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 3px dashed #4facfe; padding-bottom: 15px; }
        .room-code { font-size: 12px; color: #4facfe; letter-spacing: 3px; background: #1a1a2e; padding: 12px; border: 3px solid #4a5568; margin-top: 15px; border-radius: 4px; }
        .section { margin-bottom: 20px; border: 3px solid #4a5568; padding: 15px; background: rgba(30, 37, 71, 0.8); border-radius: 8px; }
        .section-title { font-size: 10px; font-weight: bold; margin-bottom: 15px; color: #4facfe; }
        #player-list { list-style: none; }
        .player-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #2d3561;
            border-left: 4px solid #4facfe;
            font-size: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-item.host { border-left-color: #ffd700; }
        .accuracy-badge { background: #00c853; padding: 4px 8px; border-radius: 4px; font-size: 8px; }
        .finished-badge { color: #ffd700; margin-left: 10px; }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #00c853 0%, #00a344 100%);
            color: #fff;
            border: none;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #007a33;
            border-radius: 4px;
            margin-top: 15px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #007a33; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #007a33; }
        
        #status { text-align: center; padding: 15px; font-size: 10px; color: #4facfe; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="color: #ffd700; font-size: 20px;">HAWAK-KARD</div>
            <div class="room-code">ROOM: {{ room_code }}</div>
        </div>

        <div class="section">
            <div class="section-title">📊 LABORATORY LEADERBOARD</div>
            <div id="player-list">
                <!-- Players will be loaded here via AJAX -->
            </div>
        </div>

        <div class="section">
            <div class="section-title">⚡ MISSION CONTROL</div>
            <button onclick="window.location.href='/game/{{ room_code }}/'">► GO TO LAB ◄</button>
        </div>

        <div id="status">Updating leaderboard...</div>
    </div>

    <script>
        const roomCode = "{{ room_code }}";

        async function updateLeaderboard() {
            try {
                const response = await fetch(`/api/room/${roomCode}/leaderboard/`);
                const data = await response.json();
                
                const list = document.getElementById("player-list");
                list.innerHTML = "";

                data.players.forEach(p => {
                    const div = document.createElement("div");
                    div.className = `player-item ${p.role === 'Host' ? 'host' : ''}`;
                    
                    const nameSpan = document.createElement("span");
                    nameSpan.textContent = `${p.nickname} (${p.role})`;
                    
                    if (p.is_finished) {
                        const badge = document.createElement("span");
                        badge.className = "finished-badge";
                        badge.textContent = " ✓ COMPLETE";
                        nameSpan.appendChild(badge);
                    }
                    
                    const accBadge = document.createElement("span");
                    accBadge.className = "accuracy-badge";
                    accBadge.textContent = `${p.accuracy}% ACCURACY`;
                    
                    div.appendChild(nameSpan);
                    div.appendChild(accBadge);
                    list.appendChild(div);
                });
                
                document.getElementById('status').innerText = "Last updated: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Leaderboard fetch failed", e);
                document.getElementById('status').innerText = "⚠ Connection error";
            }
        }

        // Poll every 5 seconds
        updateLeaderboard();
        const intervalId = setInterval(updateLeaderboard, 5000);
        window.addEventListener('beforeunload', () => clearInterval(intervalId));
    </script>
</body>
</html>
