<!DOCTYPE html>
<html>
<head>
    <title>HAWAK-KARD | Game Board</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(#1e1e1e, #000);
            color: #eee;
            font-family: monospace;
        }

        .board {
            display: grid;
            grid-template-rows: 1fr auto 1fr;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        .zone {
            border: 2px dashed #555;
            padding: 10px;
        }

        .hand {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .card {
            width: 90px;
            height: 130px;
            background: #f5e6d3;
            color: #000;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="board">
    <div class="zone" id="enemy-zone">ENEMY ZONE</div>

    <div class="zone" id="battle-zone">⚔ BATTLE ZONE ⚔</div>

    <div class="zone">
        <div class="hand" id="player-hand"></div>
    </div>
</div>

<script>
    const roomCode = "{{ room_code }}";

    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/game/" + roomCode + "/"
    );

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === "hand") {
            renderHand(data.cards);
        }
    };

    function renderHand(cards) {
        const hand = document.getElementById("player-hand");
        hand.innerHTML = "";

        cards.forEach(card => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerText = card.name;
            div.onclick = () => playCard(card.id);
            hand.appendChild(div);
        });
    }

    function playCard(cardId) {
        socket.send(JSON.stringify({
            action: "play_card",
            card_id: cardId
        }));
    }
</script>

</body>
</html>
