<!DOCTYPE html>
<html>
<head>
    <title>HAWAK-KARD - 8-bit Lab Adventure</title>
    <style>
            * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #d4a574 0%, #c9945e 50%, #8b7355 100%);
            color: #3d2817;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
            position: relative;
        }

        .rotating-earth {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            opacity: 0.25;
            animation: rotate 300s linear infinite;
            z-index: 0;
            pointer-events: none;
            filter: brightness(1.2);
        }

        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotateY(0deg); }
            100% { transform: translate(-50%, -50%) rotateY(360deg); }
        }

        #earth-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 50vh;
            z-index: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #earth-container canvas {
            display: block !important;
            width: 80vw !important;
            height: 80vh !important;
            margin: 0 !important;
            padding: 0 !important;
            aspect-ratio: auto !important;
        }

        .container {
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
            border: 4px solid #8b6f47;
            padding: 30px;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(139, 111, 71, 0.4), inset 0 0 15px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    rgba(139, 111, 71, 0.03) 0px,
                    rgba(139, 111, 71, 0.03) 2px,
                    transparent 2px,
                    transparent 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    rgba(139, 111, 71, 0.03) 0px,
                    rgba(139, 111, 71, 0.03) 2px,
                    transparent 2px,
                    transparent 4px
                );
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #5d4e37;
            letter-spacing: 3px;
        }

        .pixel-art-earth {
            display: inline-block;
            margin: 20px 0;
            font-size: 20px;
            line-height: 20px;
        }

        .subtitle {
            font-size: 14px;
            color: #5d4e37;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .leaves {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 24px;
        }

        .leaf {
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 1px;
            color: #5d4e37;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #8b6f47;
            background: rgba(255, 255, 255, 0.8);
            color: #3d2817;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #9d8a6d;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(139, 111, 71, 0.4);
            background: rgba(255, 255, 255, 0.95);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #c4a57b 0%, #9d8b6d 100%);
            color: #fff;
            border: 3px solid #5d4e37;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.1s;
            box-shadow: 3px 3px 0 rgba(93, 78, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        button:hover {
            background: linear-gradient(135deg, #d4a574 0%, #a89d70 100%);
            box-shadow: 5px 5px 0 rgba(93, 78, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transform: translate(-2px, -2px);
        }

        button:active {
            box-shadow: 1px 1px 0 rgba(93, 78, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transform: translate(1px, 1px);
        }

        .error {
            color: #8b3a3a;
            background: rgba(255, 200, 200, 0.7);
            border: 2px solid #8b3a3a;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .lab-elements {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 20px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #5d4e37;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="earth-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;"></div>
    <div class="rotating-earth" style="display: none;"></div>
    <div class="container">
        <div class="header">
            <div class="title">⚗ HAWAK-KARD ⚗</div>
            <div class="subtitle">8-BIT LAB ADVENTURE</div>
            
            <div class="pixel-art-earth">
                🌍
            </div>

            <div class="leaves">
                <div class="leaf">🍃</div>
                <div class="leaf">🍂</div>
                <div class="leaf">🍃</div>
            </div>

            <div class="lab-elements">
                <span>🧪</span>
                <span>🔬</span>
                <span>📡</span>
            </div>
        </div>

        {% if error %}
            <div class="error">
                ⚠ ERROR: {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="nickname">ENTER NICKNAME:</label>
                <input type="text" id="nickname" name="nickname" placeholder="YOUR NAME" required>
            </div>

            <div class="form-group">
                <label for="room_code">ROOM CODE (OPTIONAL):</label>
                <input type="text" id="room_code" name="room_code" placeholder="LEAVE BLANK TO CREATE">
            </div>

            <button type="submit">► ENTER LAB ◄</button>
        </form>

        <div class="footer-text">
            ~ PRESERVING THE ECOSYSTEM ~
        </div>
    </div>

    <script>
        const container = document.getElementById('earth-container');
        const scene = new THREE.Scene();

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        // Renderer (high-DPI friendly)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        function resizeRenderer() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            const dpr = window.devicePixelRatio || 1;

            renderer.setPixelRatio(dpr);           // sharp on Retina screens
            renderer.setSize(width, height, false);

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', resizeRenderer);
        resizeRenderer(); // initial size

        // Create Earth geometry
        const geometry = new THREE.SphereGeometry(2.5, 64, 64);

        // Create canvas texture for Earth
        const canvas = document.createElement('canvas');
        canvas.width = 2048;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        // Ocean
        ctx.fillStyle = '#4a90e2';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Land
        ctx.fillStyle = '#2d5016';
        ctx.fillRect(100, 300, 200, 150); // N.America
        ctx.fillRect(150, 520, 120, 180); // S.America
        ctx.fillRect(750, 180, 140, 120); // Europe
        ctx.fillRect(800, 380, 160, 240); // Africa
        ctx.fillRect(980, 220, 320, 220); // Asia
        ctx.fillRect(1280, 540, 120, 140); // Australia
        ctx.fillRect(420, 130, 80, 100); // Greenland

        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.MeshPhongMaterial({
            map: texture,
            emissive: 0x333333,
            emissiveIntensity: 0.3
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
